<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APUSH TRADING FLOOR</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f110f;
    --bg2:       #111411;
    --surface:   #141814;
    --border:    #1c281c;
    --border2:   #243024;
    --green:     #4bad6c;
    --green-dim: #1e3a22;
    --green-mid: #2d5c35;
    --amber:     #e07b30;
    --amber-dim: #3a2010;
    --red:       #d94040;
    --red-dim:   #3a1010;
    --dim:       #2a3c2a;
    --dim2:      #1a261a;
    --text-dim:  #3a5a3a;
    --mono:      'Roboto Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  html, body {
    width: 100%;
    height: 300px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--mono);
  }

  /* ════════════════════════════════
     TICKER
  ════════════════════════════════ */
  .ticker-wrap {
    height: 32px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .ticker-badge {
    flex-shrink: 0;
    background: var(--green);
    color: #0a0f0a;
    font-size: 8.5px;
    font-weight: 500;
    letter-spacing: 0.2em;
    padding: 0 10px;
    height: 100%;
    display: flex;
    align-items: center;
  }

  .ticker-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(to left, var(--bg2), transparent);
    pointer-events: none;
    z-index: 1;
  }

  .ticker-track { overflow: hidden; flex: 1; height: 100%; }

  .ticker-tape {
    display: inline-flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    will-change: transform;
  }
  .ticker-tape.running { animation: scroll linear infinite; }
  .ticker-tape:hover   { animation-play-state: paused; }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .t-sep  { color: var(--dim); font-size: 12px; padding: 0 14px; user-select: none; }
  .t-pill {
    font-size: 8px; font-weight: 500; letter-spacing: 0.12em;
    border: 1px solid currentColor; padding: 1px 4px; margin-right: 5px;
  }
  .t-pill.g { color: var(--green); border-color: var(--green-dim); }
  .t-pill.w { color: var(--amber); border-color: var(--amber-dim); }
  .t-pill.r { color: var(--red);   border-color: var(--red-dim);   }
  .t-val    { font-size: 10px; letter-spacing: 0.02em; margin-right: 4px; }
  .t-val.g  { color: var(--green); }
  .t-val.w  { color: var(--amber); }
  .t-val.r  { color: var(--red);   }
  .t-val.d  { color: var(--text-dim); }

  /* ════════════════════════════════
     STATUS BAR
  ════════════════════════════════ */
  .status-bar {
    height: 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 16px;
    flex-shrink: 0;
  }
  .sb-item { font-size: 8px; letter-spacing: 0.1em; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
  .sb-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 2s step-end infinite; }
  .sb-item.r .dot { background: var(--red); }
  .sb-item .val { color: var(--green); }
  .sb-item.w .val { color: var(--amber); }
  .sb-item.r .val { color: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ════════════════════════════════
     MAIN GRID
  ════════════════════════════════ */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    height: 248px; /* 300 - 32 - 20 */
    gap: 1px;
    background: var(--border);
  }

  .panel {
    background: var(--bg);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow: hidden;
  }

  .panel-label {
    font-size: 7.5px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .panel-label .live {
    color: var(--green);
    font-size: 7px;
    animation: blink 2s step-end infinite;
  }

  /* ── P&L bars ── */
  .pnl-item { display: flex; flex-direction: column; gap: 2px; }

  .pnl-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .pnl-name { font-size: 9px; color: var(--green); letter-spacing: 0.06em; }
  .pnl-pct  { font-size: 11px; font-weight: 500; }
  .pnl-pct.g { color: var(--green); }
  .pnl-pct.w { color: var(--amber); }
  .pnl-pct.r { color: var(--red);   }

  .pnl-track {
    height: 5px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 1px;
    overflow: hidden;
  }
  .pnl-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 1.2s ease-out;
  }
  .pnl-fill.g { background: var(--green); }
  .pnl-fill.w { background: var(--amber); }
  .pnl-fill.r { background: var(--red);   }

  .pnl-sub {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--text-dim);
  }
  .pnl-sub .warn { color: var(--amber); }
  .pnl-sub .danger { color: var(--red); }

  /* ── Deadline cards ── */
  .dl-card {
    border: 1px solid;
    padding: 4px 6px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
  }
  .dl-card.r { border-color: var(--red-dim);   background: rgba(217,64,64,0.04);  }
  .dl-card.w { border-color: var(--amber-dim); background: rgba(224,123,48,0.04); }
  .dl-card.g { border-color: var(--green-dim); background: rgba(75,173,108,0.04); }

  .dl-top { display: flex; justify-content: space-between; align-items: baseline; }
  .dl-ticker { font-size: 9.5px; font-weight: 500; letter-spacing: 0.08em; }
  .dl-card.r .dl-ticker { color: var(--red);   }
  .dl-card.w .dl-ticker { color: var(--amber); }
  .dl-card.g .dl-ticker { color: var(--green); }
  .dl-days { font-size: 8px; }
  .dl-card.r .dl-days { color: var(--red);   }
  .dl-card.w .dl-days { color: var(--amber); }
  .dl-card.g .dl-days { color: var(--green); }
  .dl-sig { font-size: 7.5px; color: var(--text-dim); }

  /* ── Today's positions ── */
  .pos-scroll {
    overflow-y: auto;
    flex: 1;
  }
  .pos-scroll::-webkit-scrollbar { width: 3px; }
  .pos-scroll::-webkit-scrollbar-track { background: transparent; }
  .pos-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .pos-row {
    display: grid;
    grid-template-columns: 28px 1fr 52px 28px;
    align-items: center;
    gap: 4px;
    padding: 3px 0;
    border-bottom: 1px solid var(--dim2);
    font-size: 8.5px;
  }
  .pos-row:last-child { border-bottom: none; }
  .pos-row:hover { background: rgba(75,173,108,0.03); }

  .pos-tag {
    font-size: 7px;
    letter-spacing: 0.06em;
    padding: 1px 3px;
    border: 1px solid currentColor;
    text-align: center;
    white-space: nowrap;
  }
  .pos-tag.g { color: var(--green); border-color: var(--green-dim); }
  .pos-tag.w { color: var(--amber); border-color: var(--amber-dim); }
  .pos-tag.r { color: var(--red);   border-color: var(--red-dim);   }

  .pos-name { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pos-est  { color: var(--text-dim); font-size: 8px; text-align: right; }
  .pos-done { text-align: center; font-size: 9px; }
  .pos-done.y { color: var(--green); }
  .pos-done.n { color: var(--border2); }

  /* loading / error */
  .loading { color: var(--text-dim); font-size: 9px; font-style: italic; padding: 8px 0; }
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-badge">APUSH&nbsp;LIVE</div>
  <div class="ticker-track">
    <div class="ticker-tape" id="tape">
      <span class="t-val d">&nbsp;&nbsp;connecting to market…</span>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar" id="status-bar">
  <div class="sb-item"><div class="dot"></div><span>loading…</span></div>
</div>

<!-- MAIN GRID -->
<div class="main">

  <!-- Panel 1: P&L -->
  <div class="panel" id="panel-pnl">
    <div class="panel-label">P&amp;L DASHBOARD <span class="live">◉ LIVE</span></div>
    <div class="loading">loading…</div>
  </div>

  <!-- Panel 2: Deadlines -->
  <div class="panel" id="panel-dl">
    <div class="panel-label">DEADLINE ORDER BOOK</div>
    <div class="loading">loading…</div>
  </div>

  <!-- Panel 3: Today's positions -->
  <div class="panel" id="panel-today">
    <div class="panel-label">TODAY'S POSITIONS <span class="live">◉ LIVE</span></div>
    <div class="loading">loading…</div>
  </div>

</div>

<script>
// ── helpers ──────────────────────────────────
const sep  = ()     => `<span class="t-sep">◆</span>`;
const pill = (c, t) => `<span class="t-pill ${c}">${t}</span>`;
const tv   = (c, t) => `<span class="t-val ${c}">${t}&nbsp;</span>`;

function urgency(days) {
  return days <= 3 ? 'r' : days <= 12 ? 'w' : 'g';
}
function typeColor(type) {
  if (type === 'Gauntlet FRQ')   return 'w';
  if (type === 'Packet of Doom') return 'r';
  if (type === 'Exam / Due')     return 'r';
  return 'g';
}
function typeLabel(type) {
  if (type === 'Gauntlet FRQ')   return 'G';
  if (type === 'Packet of Doom') return 'POD';
  if (type === 'IDs / KT')       return 'IDs';
  if (type === 'Review / Class') return 'CLS';
  if (type === 'Exam / Due')     return 'DUE';
  return '—';
}

// ── render ticker ─────────────────────────────
function renderTicker({ stats, todayTasks }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal,
          totalDone, totalTasks, daysGaunt, daysPOD, daysExam,
          gauntPace, podPace } = stats;

  const totalPct = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;

  let h = '';
  h += sep();
  h += pill('r','GAUNTLET'); h += tv('w',`${gauntletDone}/${gauntletTotal} FRQs`); h += tv('d','·'); h += tv(urgency(daysGaunt),`due May 1`); h += tv('d','·'); h += tv('w',`${gauntPace}/day needed`);
  h += sep();
  h += pill('r','POD'); h += tv('r',`${podDone}/${podTotal} pages`); h += tv('d','·'); h += tv(urgency(daysPOD),`due May 4`); h += tv('d','·'); h += tv('w',`${podPace} pg/day needed`);
  h += sep();
  h += pill('r','EXAM'); h += tv(urgency(daysExam),`T–${daysExam} DAYS`); h += tv('d','· May 8 · AP College Board');
  h += sep();
  h += pill('g','PORTFOLIO'); h += tv('w',`${totalPct}% complete`); h += tv('d',`· ${totalDone}/${totalTasks} tasks`);
  h += sep();
  h += pill('g','TODAY');
  if (todayTasks.length > 0) {
    todayTasks.forEach(t => {
      const c = typeColor(t.type);
      h += pill(c, typeLabel(t.type));
      h += tv(c, t.task);
      if (t.est) h += tv('d',`(${t.est})`);
      h += sep();
    });
  } else {
    h += tv('g','No tasks scheduled'); h += sep();
  }
  h += pill('w','VELOCITY'); h += tv('w',`${gauntPace} FRQ/day`); h += tv('d','Gauntlet'); h += sep(); h += tv('w',`${podPace} pg/day`); h += tv('d','POD'); h += sep();

  return h;
}

// ── render status bar ─────────────────────────
function renderStatus({ stats }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal, daysExam, gauntPace } = stats;
  const gauntPctNum = gauntletTotal ? Math.round(gauntletDone/gauntletTotal*100) : 0;
  return `
    <div class="sb-item"><div class="dot"></div><span>MARKETS OPEN</span></div>
    <div class="sb-item w"><div class="dot"></div><span>GAUNTLET</span><span class="val">${gauntletDone}/${gauntletTotal} · ${gauntPctNum}%</span></div>
    <div class="sb-item r"><div class="dot"></div><span>POD</span><span class="val">${podDone}/${podTotal}</span></div>
    <div class="sb-item r"><div class="dot"></div><span>EXAM</span><span class="val">T–${daysExam}D</span></div>
    <div class="sb-item w"><div class="dot"></div><span>PACE REQ</span><span class="val">${gauntPace} FRQ/day</span></div>
  `;
}

// ── render P&L panel ──────────────────────────
function renderPnL({ stats }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal,
          totalDone, totalTasks, daysGaunt, daysPOD, gauntPace, podPace } = stats;

  const gauntPct = gauntletTotal ? Math.round(gauntletDone/gauntletTotal*100) : 0;
  const podPct   = podTotal      ? Math.round(podDone/podTotal*100)           : 0;
  const totPct   = totalTasks    ? Math.round(totalDone/totalTasks*100)       : 0;

  const gc = urgency(daysGaunt);
  const pc = urgency(daysPOD);

  return `
    <div class="pnl-item">
      <div class="pnl-top">
        <span class="pnl-name">GAUNT-FRQ</span>
        <span class="pnl-pct ${gc}">${gauntPct}%</span>
      </div>
      <div class="pnl-track"><div class="pnl-fill ${gc}" style="width:${gauntPct}%"></div></div>
      <div class="pnl-sub">
        <span>${gauntletDone} / ${gauntletTotal} filled</span>
        <span class="warn">▲ ${gauntPace}/day · ${daysGaunt}d left</span>
      </div>
    </div>

    <div class="pnl-item">
      <div class="pnl-top">
        <span class="pnl-name">POD-PAGE</span>
        <span class="pnl-pct ${pc}">${podPct}%</span>
      </div>
      <div class="pnl-track"><div class="pnl-fill ${pc}" style="width:${podPct}%"></div></div>
      <div class="pnl-sub">
        <span>${podDone} / ${podTotal} filled</span>
        <span class="danger">▲ ${podPace} pg/day · ${daysPOD}d left</span>
      </div>
    </div>

    <div class="pnl-item">
      <div class="pnl-top">
        <span class="pnl-name">PORTFOLIO</span>
        <span class="pnl-pct g">${totPct}%</span>
      </div>
      <div class="pnl-track"><div class="pnl-fill g" style="width:${totPct}%"></div></div>
      <div class="pnl-sub">
        <span>${totalDone} / ${totalTasks} tasks closed</span>
      </div>
    </div>
  `;
}

// ── render deadline panel ─────────────────────
function renderDeadlines({ stats }) {
  const { daysGaunt, daysPOD, daysExam } = stats;
  const gc = urgency(daysGaunt);
  const pc = urgency(daysPOD);
  const ec = urgency(daysExam);

  return `
    <div class="dl-card ${gc}">
      <div class="dl-top">
        <span class="dl-ticker">GAUNT-FRQ</span>
        <span class="dl-days">${daysGaunt}D OUT</span>
      </div>
      <div class="dl-sig">All 40 FRQs · Due May 1 · Run w/ Mrs. D</div>
    </div>
    <div class="dl-card ${pc}">
      <div class="dl-top">
        <span class="dl-ticker">POD-PAGE</span>
        <span class="dl-days">${daysPOD}D OUT</span>
      </div>
      <div class="dl-sig">19 pages · 5 parts · Due May 4</div>
    </div>
    <div class="dl-card ${ec}">
      <div class="dl-top">
        <span class="dl-ticker">APUSH-EXAM</span>
        <span class="dl-days">${daysExam}D OUT</span>
      </div>
      <div class="dl-sig">Final settlement · May 8 · AP College Board</div>
    </div>
  `;
}

// ── render today's positions ──────────────────
function renderToday({ todayTasks }) {
  if (todayTasks.length === 0) {
    return `<div class="loading">No tasks scheduled for today.</div>`;
  }
  return `
    <div class="pos-scroll">
      ${todayTasks.map(t => {
        const c = typeColor(t.type);
        const l = typeLabel(t.type);
        const doneClass = t.done ? 'y' : 'n';
        const doneIcon  = t.done ? '✓' : '○';
        return `
          <div class="pos-row">
            <span class="pos-tag ${c}">${l}</span>
            <span class="pos-name" title="${t.task}">${t.task}</span>
            <span class="pos-est">${t.est || '—'}</span>
            <span class="pos-done ${doneClass}">${doneIcon}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ── fetch + render all ────────────────────────
async function init() {
  try {
    const res = await fetch('/api/notion');
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();

    // Ticker
    const tape = document.getElementById('tape');
    const html = renderTicker(data);
    tape.innerHTML = html + html;
    tape.classList.add('running');
    tape.style.animationDuration = (tape.scrollWidth / 2 / 90).toFixed(1) + 's';

    // Status bar
    document.getElementById('status-bar').innerHTML = renderStatus(data);

    // Panels
    document.getElementById('panel-pnl').innerHTML =
      `<div class="panel-label">P&L DASHBOARD <span class="live">◉ LIVE</span></div>` + renderPnL(data);

    document.getElementById('panel-dl').innerHTML =
      `<div class="panel-label">DEADLINE ORDER BOOK</div>` + renderDeadlines(data);

    document.getElementById('panel-today').innerHTML =
      `<div class="panel-label">TODAY'S POSITIONS <span class="live">◉ LIVE</span></div>` + renderToday(data);

  } catch (err) {
    const msg = `<div class="loading">⚠ ${err.message}</div>`;
    document.getElementById('tape').innerHTML = `<span class="t-val d">&nbsp;⚠ ${err.message}</span>`;
    document.getElementById('panel-pnl').innerHTML   = msg;
    document.getElementById('panel-dl').innerHTML    = msg;
    document.getElementById('panel-today').innerHTML = msg;
  }
}

init();
</script>
</body>
</html>
