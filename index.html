<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APUSH TRADING FLOOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #090b09;
  --bg2:       #0c0e0c;
  --surface:   #101210;
  --border:    #182018;
  --border2:   #1e2a1e;
  --green:     #4bad6c;
  --green-hi:  #63c784;
  --green-dim: #162a1c;
  --green-mid: #22442c;
  --amber:     #e07b30;
  --amber-dim: #321c08;
  --red:       #d94040;
  --red-dim:   #331010;
  --text-dim:  #2e5030;
  --text-mid:  #3d6840;
  --mono:      'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--green);
  font-family: var(--mono);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
@keyframes scroll  { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes fadein  { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.ticker-wrap {
  flex-shrink: 0;
  height: 34px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
  z-index: 10;
}
.ticker-badge {
  flex-shrink: 0;
  background: var(--green);
  color: #050905;
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: .22em;
  padding: 0 12px;
  height: 100%;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.ticker-fade {
  position: absolute; right: 0; top: 0; bottom: 0; width: 48px;
  background: linear-gradient(to left, var(--bg2), transparent);
  pointer-events: none; z-index: 1;
}
.ticker-track { overflow: hidden; flex: 1; height: 100%; }
.ticker-tape {
  display: inline-flex;
  align-items: center;
  height: 100%;
  white-space: nowrap;
  will-change: transform;
}
.ticker-tape.running { animation: scroll linear infinite; }
.ticker-tape:hover   { animation-play-state: paused; }
.t-sep  { color: var(--text-dim); font-size: 12px; padding: 0 16px; user-select: none; }
.t-pill { font-size: 7.5px; font-weight: 600; letter-spacing: .14em; border: 1px solid currentColor; padding: 1px 5px; margin-right: 6px; }
.t-val { font-size: 10px; letter-spacing: .02em; margin-right: 4px; }
.g { color: var(--green); }.g.t-pill { border-color: var(--green-dim); }
.w { color: var(--amber); }.w.t-pill { border-color: var(--amber-dim); }
.r { color: var(--red);   }.r.t-pill { border-color: var(--red-dim);   }
.d { color: var(--text-dim); }
.status-bar {
  flex-shrink: 0;
  height: 22px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 20px;
  overflow: hidden;
}
.sb { font-size: 7.5px; letter-spacing: .1em; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
.sb .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 2.4s step-end infinite; }
.sb.w .dot { background: var(--amber); }
.sb.r .dot { background: var(--red); }
.sb .val { color: var(--green); }
.sb.w .val { color: var(--amber); }
.sb.r .val { color: var(--red); }
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: auto 1fr;
  gap: 1px;
  background: var(--border);
  overflow: hidden;
  min-height: 0;
}
.panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.panel-head {
  flex-shrink: 0;
  font-size: 7.5px;
  letter-spacing: .18em;
  color: var(--text-dim);
  padding: 6px 10px 5px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-head .live { color: var(--green); font-size: 7px; animation: blink 2.4s step-end infinite; }
.panel-body { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.left-col {
  grid-row: 1 / 3;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.col-divider { flex-shrink: 0; height: 1px; background: var(--border); }
.pnl-item { display: flex; flex-direction: column; gap: 3px; animation: fadein .4s ease; }
.pnl-top  { display: flex; justify-content: space-between; align-items: baseline; }
.pnl-name { font-size: 8.5px; color: var(--green); letter-spacing: .07em; }
.pnl-pct  { font-size: 13px; font-weight: 500; }
.pnl-pct.g { color: var(--green); }
.pnl-pct.w { color: var(--amber); }
.pnl-pct.r { color: var(--red);   }
.pnl-track { height: 5px; background: var(--surface); border: 1px solid var(--border2); border-radius: 1px; overflow: hidden; }
.pnl-fill { height: 100%; border-radius: 1px; transition: width 1.4s cubic-bezier(.4,0,.2,1); }
.pnl-fill.g { background: var(--green); }
.pnl-fill.w { background: var(--amber); }
.pnl-fill.r { background: var(--red);   }
.pnl-sub { display: flex; justify-content: space-between; font-size: 7.5px; color: var(--text-dim); }
.pnl-sub .warn { color: var(--amber); }
.pnl-sub .danger { color: var(--red); }
.dl-card { border: 1px solid; padding: 5px 8px; display: flex; flex-direction: column; gap: 2px; animation: fadein .4s ease; }
.dl-card.r { border-color: var(--red-dim);   background: rgba(217,64,64,.04);  }
.dl-card.w { border-color: var(--amber-dim); background: rgba(224,123,48,.04); }
.dl-card.g { border-color: var(--green-dim); background: rgba(75,173,108,.04); }
.dl-top { display: flex; justify-content: space-between; align-items: baseline; }
.dl-ticker { font-size: 10px; font-weight: 500; letter-spacing: .08em; }
.dl-card.r .dl-ticker { color: var(--red); }
.dl-card.w .dl-ticker { color: var(--amber); }
.dl-card.g .dl-ticker { color: var(--green); }
.dl-days { font-size: 8px; }
.dl-card.r .dl-days { color: var(--red); }
.dl-card.w .dl-days { color: var(--amber); }
.dl-card.g .dl-days { color: var(--green); }
.dl-sig { font-size: 7.5px; color: var(--text-dim); }
.today-panel { grid-column: 2; grid-row: 1; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; max-height: 260px; }
.pos-row {
  display: grid;
  grid-template-columns: 24px 38px 1fr auto 22px;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid #101810;
  font-size: 9px;
  animation: fadein .3s ease;
  transition: background .15s;
}
.pos-row:last-child { border-bottom: none; }
.pos-row:hover { background: rgba(75,173,108,.025); }
.pos-check {
  width: 14px; height: 14px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  flex-shrink: 0;
}
.pos-check:hover { border-color: var(--green-mid); }
.pos-check.checked { background: var(--green-dim); border-color: var(--green-mid); }
.pos-check.checked::after { content: '✓'; font-size: 9px; color: var(--green); }
.pos-check.pending { opacity: .5; pointer-events: none; }
.pos-tag { font-size: 7px; font-weight: 500; letter-spacing: .07em; padding: 1px 4px; border: 1px solid currentColor; text-align: center; white-space: nowrap; }
.pos-tag.g { color: var(--green); border-color: var(--green-dim); }
.pos-tag.w { color: var(--amber); border-color: var(--amber-dim); }
.pos-tag.r { color: var(--red);   border-color: var(--red-dim);   }
.pos-tag.d { color: var(--text-mid); border-color: var(--border); }
.pos-name { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color .2s; }
.pos-name.done { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-dim); }
.pos-est { color: var(--text-dim); font-size: 8px; white-space: nowrap; }
.empty-state { font-size: 9px; color: var(--text-dim); font-style: italic; padding: 12px 0; }
.table-panel { grid-column: 2; grid-row: 2; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.filter-bar { flex-shrink: 0; padding: 5px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 7.5px; color: var(--text-dim); letter-spacing: .12em; margin-right: 2px; }
.filter-btn { font-family: var(--mono); font-size: 7.5px; letter-spacing: .1em; color: var(--text-dim); background: transparent; border: 1px solid var(--border); padding: 2px 7px; cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
.filter-btn:hover { color: var(--green); border-color: var(--green-mid); }
.filter-btn.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.filter-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
.table-scroll { flex: 1; overflow-y: auto; min-height: 0; }
.table-scroll::-webkit-scrollbar { width: 3px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 8.5px; }
thead { position: sticky; top: 0; z-index: 2; }
th { background: var(--surface); color: var(--text-mid); letter-spacing: .12em; font-size: 7px; font-weight: 500; text-align: left; padding: 5px 10px; border-bottom: 1px solid var(--border2); white-space: nowrap; }
td { padding: 4px 10px; border-bottom: 1px solid #101810; color: var(--green); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(75,173,108,.02); }
tr.done-row td { color: var(--text-dim); }
tr.done-row .td-name { text-decoration: line-through; text-decoration-color: var(--text-dim); }
.td-name { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-type { white-space: nowrap; }
.td-date { white-space: nowrap; color: var(--text-mid); font-size: 8px; }
.td-est  { white-space: nowrap; color: var(--text-dim); font-size: 8px; }
.td-week { white-space: nowrap; color: var(--text-dim); font-size: 8px; }
.td-done { text-align: center; font-size: 10px; }
.td-done.y { color: var(--green); }
.td-done.n { color: var(--border2); }
.type-pill { font-size: 7px; font-weight: 500; letter-spacing: .07em; padding: 1px 4px; border: 1px solid currentColor; }
.type-pill.g { color: var(--green); border-color: var(--green-dim); }
.type-pill.w { color: var(--amber); border-color: var(--amber-dim); }
.type-pill.r { color: var(--red);   border-color: var(--red-dim);   }
.type-pill.d { color: var(--text-mid); border-color: var(--border); }
.skel { color: var(--text-dim); font-size: 9px; font-style: italic; padding: 16px; }
.refresh-dot { position: fixed; bottom: 8px; right: 10px; font-size: 7px; color: var(--text-dim); letter-spacing: .1em; display: flex; align-items: center; gap: 5px; }
.refresh-dot .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); }
.refresh-dot .dot.spin { animation: blink .6s step-end 3; }
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-badge">APUSH&nbsp;LIVE</div>
  <div class="ticker-track">
    <div class="ticker-tape" id="tape">
      <span class="t-val d">&nbsp;&nbsp;connecting to market…</span>
    </div>
  </div>
  <div class="ticker-fade"></div>
</div>
<div class="status-bar" id="status-bar">
  <div class="sb"><div class="dot"></div><span>LOADING…</span></div>
</div>
<div class="main">
  <div class="left-col">
    <div class="panel-head">P&amp;L DASHBOARD <span class="live">◉ LIVE</span></div>
    <div class="panel-body" id="pnl-body"><div class="skel">loading…</div></div>
    <div class="col-divider"></div>
    <div class="panel-head">DEADLINE ORDER BOOK</div>
    <div class="panel-body" id="dl-body"><div class="skel">loading…</div></div>
  </div>
  <div class="today-panel panel">
    <div class="panel-head">TODAY'S POSITIONS <span class="live">◉ LIVE</span></div>
    <div class="panel-body" id="today-body"><div class="skel">loading…</div></div>
  </div>
  <div class="table-panel">
    <div class="panel-head">
      FULL ORDER BOOK
      <span id="table-count" style="color:var(--text-dim);font-size:7px;letter-spacing:.1em"></span>
    </div>
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">WEEK</span>
      <button class="filter-btn active" data-week="ALL">ALL</button>
      <button class="filter-btn" data-week="Week 1 — Apr 15–19">W1</button>
      <button class="filter-btn" data-week="Week 2 — Apr 20–26">W2</button>
      <button class="filter-btn" data-week="Week 3 — Apr 27 – May 3">W3</button>
      <button class="filter-btn" data-week="Week 4 — Exam Week">W4</button>
      <div class="filter-sep"></div>
      <span class="filter-label">TYPE</span>
      <button class="filter-btn active" data-type="ALL">ALL</button>
      <button class="filter-btn" data-type="Gauntlet FRQ">GAUNT</button>
      <button class="filter-btn" data-type="Packet of Doom">POD</button>
      <button class="filter-btn" data-type="IDs / KT">IDS</button>
      <button class="filter-btn" data-type="Review / Class">CLASS</button>
      <button class="filter-btn" data-type="Exam / Due">DUE</button>
      <div class="filter-sep"></div>
      <button class="filter-btn" id="show-done-btn" data-show-done="false">HIDE DONE</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>TASK</th><th>TYPE</th><th>DATE</th><th>EST</th><th>WEEK</th><th>✓</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="6" class="skel">loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="refresh-dot">
  <div class="dot" id="rdot"></div>
  <span id="rtime">—</span>
</div>
<script>
const sep  = ()     => `<span class="t-sep">◆</span>`;
const pill = (c, t) => `<span class="t-pill ${c}">${t}</span>`;
const tv   = (c, t) => `<span class="t-val ${c}">${t}&nbsp;</span>`;
function urgency(days) { return days <= 4 ? 'r' : days <= 10 ? 'w' : 'g'; }
function typeColor(type) {
  if (type === 'Gauntlet FRQ')   return 'w';
  if (type === 'Packet of Doom') return 'r';
  if (type === 'Exam / Due')     return 'r';
  if (type === 'IDs / KT')       return 'g';
  return 'd';
}
function typeLabel(type) {
  if (type === 'Gauntlet FRQ')   return 'GAUNT';
  if (type === 'Packet of Doom') return 'POD';
  if (type === 'IDs / KT')       return 'IDS';
  if (type === 'Review / Class') return 'CLASS';
  if (type === 'Exam / Due')     return 'DUE';
  return 'OTHER';
}
function fmtDate(d) {
  if (!d) return '—';
  const [, m, day] = d.split('-');
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m]} ${+day}`;
}
function weekShort(w) {
  if (!w) return '—';
  return w.replace('Week ', 'W').split(' —')[0];
}
let _data = null;
let _weekFilter = 'ALL';
let _typeFilter = 'ALL';
let _showDone   = true;
function renderTicker({ stats, todayTasks }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal,
          totalDone, totalTasks, daysGaunt, daysPOD, daysExam,
          gauntPace, podPace } = stats;
  const totalPct = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;
  const gc = urgency(daysGaunt), pc = urgency(daysPOD), ec = urgency(daysExam);
  let h = '';
  h += sep();
  h += pill('r','GAUNTLET');
  h += tv('w', `${gauntletDone}/${gauntletTotal} FRQs`);
  h += tv('d','·');
  h += tv(gc, `${daysGaunt}d to May 1`);
  h += tv('d','·');
  h += tv('w', `${gauntPace} FRQ/day needed`);
  h += sep();
  h += pill('r','POD');
  h += tv('r', `${podDone}/${podTotal} pages`);
  h += tv('d','·');
  h += tv(pc, `${daysPOD}d to May 4`);
  h += tv('d','·');
  h += tv('w', `${podPace} pg/day needed`);
  h += sep();
  h += pill('r','EXAM');
  h += tv(ec, `T–${daysExam} DAYS`);
  h += tv('d','· May 8 · AP College Board');
  h += sep();
  h += pill('g','PORTFOLIO');
  h += tv('w', `${totalPct}% complete · ${totalDone}/${totalTasks} tasks`);
  h += sep();
  h += pill('g','TODAY');
  if (todayTasks.length) {
    todayTasks.forEach(t => {
      const c = typeColor(t.type);
      h += pill(c, typeLabel(t.type));
      h += tv(t.done ? 'd' : c, t.done ? `[DONE] ${t.task}` : t.task);
      if (t.est) h += tv('d', `(${t.est})`);
      h += sep();
    });
  } else {
    h += tv('g','No tasks scheduled'); h += sep();
  }
  h += pill('w','VELOCITY');
  h += tv('w', `${gauntPace} FRQ/day`); h += tv('d','Gauntlet');
  h += sep();
  h += tv('w', `${podPace} pg/day`); h += tv('d','POD');
  h += sep();
  return h;
}
function renderStatus({ stats }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal,
          totalDone, totalTasks, daysExam, gauntPace, podPace } = stats;
  const gauntPct = gauntletTotal ? Math.round(gauntletDone / gauntletTotal * 100) : 0;
  const podPct   = podTotal      ? Math.round(podDone      / podTotal      * 100) : 0;
  const totPct   = totalTasks    ? Math.round(totalDone    / totalTasks    * 100) : 0;
  return `
    <div class="sb"><div class="dot"></div><span>MARKETS OPEN</span></div>
    <div class="sb w"><div class="dot"></div><span>GAUNTLET</span><span class="val">${gauntletDone}/${gauntletTotal} · ${gauntPct}%</span></div>
    <div class="sb r"><div class="dot"></div><span>POD</span><span class="val">${podDone}/${podTotal} · ${podPct}%</span></div>
    <div class="sb r"><div class="dot"></div><span>EXAM</span><span class="val">T–${daysExam}D</span></div>
    <div class="sb w"><div class="dot"></div><span>PACE</span><span class="val">${gauntPace} FRQ/d · ${podPace} pg/d</span></div>
    <div class="sb"><div class="dot"></div><span>PORTFOLIO</span><span class="val">${totPct}%</span></div>
  `;
}
function renderPnL({ stats }) {
  const { gauntletDone, gauntletTotal, podDone, podTotal,
          totalDone, totalTasks, daysGaunt, daysPOD, gauntPace, podPace } = stats;
  const gPct = gauntletTotal ? Math.round(gauntletDone / gauntletTotal * 100) : 0;
  const pPct = podTotal      ? Math.round(podDone      / podTotal      * 100) : 0;
  const tPct = totalTasks    ? Math.round(totalDone    / totalTasks    * 100) : 0;
  const gc = urgency(daysGaunt), pc = urgency(daysPOD);
  return `
    <div class="pnl-item">
      <div class="pnl-top"><span class="pnl-name">GAUNT-FRQ</span><span class="pnl-pct ${gc}">${gPct}%</span></div>
      <div class="pnl-track"><div class="pnl-fill ${gc}" style="width:0%" data-target="${gPct}"></div></div>
      <div class="pnl-sub"><span>${gauntletDone} / ${gauntletTotal} filed</span><span class="warn">▲ ${gauntPace}/day · ${daysGaunt}d left</span></div>
    </div>
    <div class="pnl-item">
      <div class="pnl-top"><span class="pnl-name">POD-PAGE</span><span class="pnl-pct ${pc}">${pPct}%</span></div>
      <div class="pnl-track"><div class="pnl-fill ${pc}" style="width:0%" data-target="${pPct}"></div></div>
      <div class="pnl-sub"><span>${podDone} / ${podTotal} filed</span><span class="danger">▲ ${podPace} pg/day · ${daysPOD}d left</span></div>
    </div>
    <div class="pnl-item">
      <div class="pnl-top"><span class="pnl-name">PORTFOLIO</span><span class="pnl-pct g">${tPct}%</span></div>
      <div class="pnl-track"><div class="pnl-fill g" style="width:0%" data-target="${tPct}"></div></div>
      <div class="pnl-sub"><span>${totalDone} / ${totalTasks} tasks closed</span></div>
    </div>
  `;
}
function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.pnl-fill[data-target]').forEach(el => {
      requestAnimationFrame(() => { el.style.width = el.dataset.target + '%'; });
    });
  });
}
function renderDeadlines({ stats }) {
  const { daysGaunt, daysPOD, daysExam } = stats;
  const gc = urgency(daysGaunt), pc = urgency(daysPOD), ec = urgency(daysExam);
  return `
    <div class="dl-card ${gc}">
      <div class="dl-top"><span class="dl-ticker">GAUNT-FRQ</span><span class="dl-days">${daysGaunt}D OUT</span></div>
      <div class="dl-sig">All 40 FRQs · Due May 1 · Run w/ Mrs. D</div>
    </div>
    <div class="dl-card ${pc}">
      <div class="dl-top"><span class="dl-ticker">POD-PAGE</span><span class="dl-days">${daysPOD}D OUT</span></div>
      <div class="dl-sig">19 pages · 5 parts · Due May 4</div>
    </div>
    <div class="dl-card ${ec}">
      <div class="dl-top"><span class="dl-ticker">APUSH-EXAM</span><span class="dl-days">${daysExam}D OUT</span></div>
      <div class="dl-sig">Final settlement · May 8 · AP College Board</div>
    </div>
  `;
}
function renderToday({ todayTasks }) {
  if (!todayTasks.length) return `<div class="empty-state">No tasks scheduled for today.</div>`;
  return todayTasks.map(t => {
    const c = typeColor(t.type);
    const l = typeLabel(t.type);
    return `
      <div class="pos-row" data-page-id="${t.pageId}">
        <div class="pos-check ${t.done ? 'checked' : ''}" title="Toggle done"></div>
        <span class="pos-tag ${c}">${l}</span>
        <span class="pos-name ${t.done ? 'done' : ''}" title="${t.task}">${t.task}</span>
        <span class="pos-est">${t.est || '—'}</span>
        <span style="font-size:9px;color:${t.done ? 'var(--green)' : 'var(--border2)'}">
          ${t.done ? '✓' : '○'}
        </span>
      </div>
    `;
  }).join('');
}
function renderTable() {
  if (!_data) return;
  let rows = _data.allTasks;
  if (_weekFilter !== 'ALL') rows = rows.filter(t => t.week === _weekFilter);
  if (_typeFilter !== 'ALL') rows = rows.filter(t => t.type === _typeFilter);
  if (!_showDone)            rows = rows.filter(t => !t.done);
  document.getElementById('table-count').textContent = `${rows.length} RECORD${rows.length !== 1 ? 'S' : ''}`;
  const tbody = document.getElementById('table-body');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="6" class="skel">No records match filter.</td></tr>`; return; }
  tbody.innerHTML = rows.map(t => {
    const c = typeColor(t.type);
    const l = typeLabel(t.type);
    return `
      <tr class="${t.done ? 'done-row' : ''}">
        <td class="td-name" title="${t.task}">${t.task}</td>
        <td class="td-type"><span class="type-pill ${c}">${l}</span></td>
        <td class="td-date">${fmtDate(t.date)}</td>
        <td class="td-est">${t.est || '—'}</td>
        <td class="td-week">${weekShort(t.week)}</td>
        <td class="td-done ${t.done ? 'y' : 'n'}">${t.done ? '✓' : '○'}</td>
      </tr>
    `;
  }).join('');
}
async function toggleTask(pageId, currentDone) {
  const newDone = !currentDone;
  const task = _data.todayTasks.find(t => t.pageId === pageId);
  if (task) {
    task.done = newDone;
    const allTask = _data.allTasks.find(t => t.pageId === pageId);
    if (allTask) allTask.done = newDone;
  }
  document.getElementById('today-body').innerHTML = renderToday(_data);
  bindCheckboxes();
  renderTable();
  try {
    const res = await fetch('/api/notion-update', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId, done: newDone }),
    });
    if (!res.ok) throw new Error(`PATCH ${res.status}`);
    flashRefreshDot();
  } catch (err) {
    console.error('Toggle failed:', err);
    if (task) { task.done = currentDone; }
    const allTask = _data.allTasks.find(t => t.pageId === pageId);
    if (allTask) allTask.done = currentDone;
    document.getElementById('today-body').innerHTML = renderToday(_data);
    bindCheckboxes();
    renderTable();
    alert(`⚠ Could not sync to Notion: ${err.message}`);
  }
}
function bindCheckboxes() {
  document.querySelectorAll('.pos-row').forEach(row => {
    const pageId = row.dataset.pageId;
    const check  = row.querySelector('.pos-check');
    const task   = _data.todayTasks.find(t => t.pageId === pageId);
    if (!check || !task) return;
    check.onclick = () => toggleTask(pageId, task.done);
  });
}
document.querySelectorAll('.filter-btn[data-week]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-week]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _weekFilter = btn.dataset.week;
    renderTable();
  });
});
document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _typeFilter = btn.dataset.type;
    renderTable();
  });
});
document.getElementById('show-done-btn').addEventListener('click', function() {
  _showDone = !_showDone;
  this.textContent = _showDone ? 'HIDE DONE' : 'SHOW DONE';
  this.classList.toggle('active', !_showDone);
  renderTable();
});
function flashRefreshDot() {
  const dot = document.getElementById('rdot');
  dot.classList.add('spin');
  setTimeout(() => dot.classList.remove('spin'), 2000);
}
function setRefreshTime() {
  const now = new Date();
  document.getElementById('rtime').textContent =
    `SYNCED ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })} ET`;
}
async function loadData() {
  try {
    const res = await fetch('/api/notion?t=' + Date.now());
    if (!res.ok) throw new Error(`API ${res.status}`);
    _data = await res.json();
    const tape = document.getElementById('tape');
    const html = renderTicker(_data);
    tape.innerHTML = html + html;
    tape.classList.add('running');
    tape.style.animationDuration = (tape.scrollWidth / 2 / 90).toFixed(1) + 's';
    document.getElementById('status-bar').innerHTML = renderStatus(_data);
    document.getElementById('pnl-body').innerHTML = renderPnL(_data);
    animateBars();
    document.getElementById('dl-body').innerHTML = renderDeadlines(_data);
    document.getElementById('today-body').innerHTML = renderToday(_data);
    bindCheckboxes();
    renderTable();
    setRefreshTime();
    flashRefreshDot();
  } catch (err) {
    const msg = `<div class="skel">⚠ ${err.message}</div>`;
    document.getElementById('tape').innerHTML = `<span class="t-val d">&nbsp;⚠ ${err.message}</span>`;
    ['pnl-body','dl-body','today-body'].forEach(id => { document.getElementById(id).innerHTML = msg; });
    document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="skel">⚠ ${err.message}</td></tr>`;
  }
}
loadData();
setInterval(loadData, 60_000);
</script>
</body>
</html>
